<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz-Game</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
</head>
<body>
    <div class="container">

        <div class="screen-active" id="start-screen">
            <h1>Quize Time!</h1>
            <p>Test your knowledge with these fun question</p>
            <button id="start-btn">Start Quize</button>
        </div>

        <div class="screen" id="quize-screen">
            <div class="quize-header">
                <h2 id="question-text">Question goes here</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of <span>5</span>
                    </p>

                    <p>score: <span id="score">0</span></p>
                </div>
            </div>

            <div class="answer-container" class="answer-container">
                <!-- Answer button will be inserted here from our js code later at some point here -->

            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
                </div>
            </div>
            <div id="result-screen" class="screen">
                <h1>Quiz Results</h1>
                <div class="result-info">
                    <p>You Scored <span id="final-score">0</span>out of <span id="max-score">5</span></p>

                    <div id="result-message">Good-job!</div>

                </div>
                <button id="resart-btn">Restart Quiz</button>

            </div>
        </div>
</body>
</html>
